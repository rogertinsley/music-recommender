services:
  app:
    build: .
    ports:
      - "3567:3567"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/music_recommender
      REDIS_URL: redis://cache:6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - media-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.encore.rule=Host(`encore.rogertinsley.com`)"
      - "traefik.http.routers.encore.entrypoints=https"
      - "traefik.http.routers.encore.tls=true"
      - "traefik.http.services.encore.loadbalancer.server.port=3567"
      - "traefik.docker.network=home-server_media-network"

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: music_recommender
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  media-network:
    external: true
    name: home-server_media-network
