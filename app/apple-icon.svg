  <!-- Record grooves -->
  <circle cx="90" cy="90" r="63" fill="none" stroke="#3f3f46" stroke-width="2.5"/>
  <circle cx="90" cy="90" r="51" fill="none" stroke="#3f3f46" stroke-width="2.5"/>
  <circle cx="90" cy="90" r="39" fill="none" stroke="#3f3f46" stroke-width="2.5"/>
